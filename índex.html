<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/media-query.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

</head>
<body>
    <main>

        <section id="login">

            <div id="imagem"></div>

            <div id="formulario">
                <h1>Login</h1>
                <p>Seja Bem Vindo Novamente, Faça Login para acessar o ambiente</p>

                <form action="login.php" method="post" autocomplete="on">

                    <div class="campo">
                        <i class="material-symbols-outlined">
                            person
                        </i>
                        <input placeholder="Seu Email" autocomplete="email" required type="email" name="email" id="iemail">
                        <label for="iemail">Seu Email: </label>
                    </div>

                    <div class="campo">
                        <i class="material-symbols-outlined">
                            key
                        </i>
                        <input placeholder="Sua senha secreta" required minlength="8" maxlength="20" type="password" name="senha" id="isenha">
                        <label for="isenha">Sua senha secreta: </label>
                    </div>

                    <input po type="submit" value="Entrar">
                    
                    <a class="botao" href="">Esqueci a senha <i class="material-symbols-outlined">mail</i></a>


                </form>
            </div>

        </section>

    </main>
</body>
</html>
